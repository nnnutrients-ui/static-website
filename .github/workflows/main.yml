# ─────────────────────────────────────────────────────────────────────────────
#  NN Nutrients — CI/CD Pipeline → Cloudflare Pages
#
#  Flow:  validate → deploy → notify
#
#  Add these secrets in GitHub → repo → Settings → Secrets → Actions:
#    CF_API_TOKEN        Cloudflare API token  (My Profile → API Tokens)
#    CF_ACCOUNT_ID       Cloudflare Account ID (right sidebar on CF dashboard)
#    CF_PAGES_PROJECT    Cloudflare Pages project name  (e.g. nn-nutrients)
#    SMTP_HOST           e.g. smtp.gmail.com
#    SMTP_PORT           e.g. 465
#    SMTP_USERNAME       your Gmail address
#    SMTP_PASSWORD       Gmail App Password (16-char)
#    NOTIFY_EMAIL        email to receive deploy alerts
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — NN Nutrients

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-nn-nutrients
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  #  CI — Validate
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: CI — Validate HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check file exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html not found"
            exit 1
          fi
          echo "✅ index.html found — $(wc -l < index.html) lines"

      - name: Validate HTML structure
        run: |
          grep -q "<!DOCTYPE html>" index.html || (echo "❌ Missing DOCTYPE"  && exit 1)
          grep -q "<html"           index.html || (echo "❌ Missing <html>"   && exit 1)
          grep -q "</html>"         index.html || (echo "❌ Missing </html>"  && exit 1)
          grep -q "<head"           index.html || (echo "❌ Missing <head>"   && exit 1)
          grep -q "</head>"         index.html || (echo "❌ Missing </head>"  && exit 1)
          grep -q "<body"           index.html || (echo "❌ Missing <body>"   && exit 1)
          grep -q "</body>"         index.html || (echo "❌ Missing </body>"  && exit 1)
          echo "✅ HTML structure valid"

      - name: Check required content
        run: |
          grep -q "xjgjrqow"     index.html || (echo "❌ Formspree ID missing"  && exit 1)
          grep -q "NN Nutrients" index.html || (echo "❌ Brand name missing"    && exit 1)
          grep -q "enquiryForm"  index.html || (echo "❌ Enquiry form missing"  && exit 1)
          grep -q "contactForm"  index.html || (echo "❌ Contact form missing"  && exit 1)
          echo "✅ Required content present"

      - name: Check file size
        run: |
          SIZE=$(wc -c < index.html)
          echo "📦 File size: ${SIZE} bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "❌ File too small — may be corrupted"
            exit 1
          fi
          echo "✅ File size OK"

  # ───────────────────────────────────────────────────────────────────────────
  #  CD — Deploy to Cloudflare Pages
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: CD — Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken:        ${{ secrets.CF_API_TOKEN }}
          accountId:       ${{ secrets.CF_ACCOUNT_ID }}
          projectName:     ${{ secrets.CF_PAGES_PROJECT }}
          directory:       .
          branch:          main
          gitHubToken:     ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "3"

      - name: Summary
        if: success()
        run: |
          echo "### ✅ NN Nutrients — Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | ${{ steps.deploy.outputs.url }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Alias    | ${{ steps.deploy.outputs.alias }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit   | \`${{ github.sha }}\`             |" >> $GITHUB_STEP_SUMMARY
          echo "| By       | ${{ github.actor }}               |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  #  Notify — Email on success or failure
  # ───────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify — Email Alert
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Determine status
        id: status
        run: |
          if   [ "${{ needs.deploy.result }}" = "success"   ]; then
            echo "value=SUCCESS ✅"   >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy.result }}" = "failure"   ]; then
            echo "value=FAILED ❌"    >> $GITHUB_OUTPUT
          else
            echo "value=CANCELLED ⚠️" >> $GITHUB_OUTPUT
          fi

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          subject:        "NN Nutrients Website — ${{ steps.status.outputs.value }}"
          to:             ${{ secrets.NOTIFY_EMAIL }}
          from:           ${{ secrets.SMTP_USERNAME }}
          body: |
            CI/CD Notification — NN Nutrients Website

            Status      : ${{ steps.status.outputs.value }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Workflow    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
